<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="task.css">
    <title>Contact Us - Future Academy</title>
</head>
<body>
	<a href="Home.html" class="site-logo">
		<strong>Future Academy</strong>
	</a>
    <nav class="format">
		<div class="nav-links">
			<a href="Home.html">Home</a>
			<a href="My course.html">My course</a>
			<a href="Add course.html">Add course</a>
			<a href="contact us.html">Contact Us</a>
		</div>
	</nav>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p class="contact">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
        
        <form class="contact-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="input" name="email" required placeholder="example@gmail.com">
            </div>
            
            <div class="form-group">
                <label for="message" class="form-label">Message</label>
                <textarea id="message" class="input" name="message" required placeholder="Type your message here..."></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
</body>
</html>
